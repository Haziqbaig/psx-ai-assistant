<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockSage AI — PSX Smart Dashboard</title>
<meta name="description" content="StockSage AI — professional Pakistan Stock Exchange (PSX) dashboard with real-time technical indicators and AI-powered recommendations for KSE-100 stocks.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter', 'system-ui', 'sans-serif']
      },
      colors: {
        navy: {
          950: '#0a0e1a',
          900: '#0f1525',
          850: '#141c30',
          800: '#1a2340'
        }
      }
    }
  }
};
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #0a0e1a;
  color: #e2e8f0;
  min-height: 100vh;
}
.glass {
  background: rgba(20, 28, 48, 0.7);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(45, 212, 191, 0.08);
  border-radius: 16px;
}
.glass-hover {
  transition: all 0.2s ease;
  cursor: pointer;
}
.glass-hover:hover {
  border-color: rgba(45, 212, 191, 0.25);
  background: rgba(26, 35, 64, 0.8);
}
.nav-item {
  transition: all 0.2s;
  border-radius: 10px;
  padding: 8px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
}
.nav-item.active {
  background: rgba(45, 212, 191, 0.12);
  color: #2dd4bf;
  font-weight: 600;
}
.nav-item:hover:not(.active) {
  background: rgba(255,255,255,0.03);
}
.nav-item i {
  width: 20px;
  text-align: center;
  margin-right: 8px;
}
.sparkline-up { color: #34d399; }
.sparkline-down { color: #f87171; }
.text-dim { color: #64748b; }
.badge-up { background: rgba(52,211,153,0.15); color: #34d399; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
.badge-down { background: rgba(248,113,113,0.15); color: #f87171; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
.live-dot {
  width: 7px; height: 7px;
  background: #34d399;
  border-radius: 50%;
  display: inline-block;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.skeleton {
  background: linear-gradient(90deg, #1a2340 25%, #232e50 50%, #1a2340 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 6px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.chart-container { position: relative; width: 100%; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 16px; }
.watchlist-row {
  transition: background 0.15s;
  border-bottom: 1px solid rgba(30,41,59,0.5);
}
.watchlist-row:hover { background: rgba(20,28,48,0.6); }
.search-dropdown { max-height: 320px; overflow-y: auto; }
#toast {
  transition: opacity 0.3s;
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 9999;
}
.sector-bar { transition: width 0.5s ease; }

/* Dark/Light theme */
body.light { background: #f1f5f9; color: #1e293b; }
body.light .glass { background: rgba(255,255,255,0.8); backdrop-filter: blur(16px); border: 1px solid rgba(100,116,139,0.15); border-radius: 16px; }
body.light .nav-item.active { background: rgba(15,118,110,0.15); color: #0f766e; }
body.light .text-dim { color: #94a3b8; }
body.light .watchlist-row { border-bottom: 1px solid rgba(203,213,225,0.5); }
body.light .watchlist-row:hover { background: rgba(241,245,249,0.8); }
body.light .skeleton { background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 200% 100%; }

/* Mobile nav active */
.mobile-nav { color: #64748b; transition: color 0.2s; }
.mobile-nav.active { color: #2dd4bf; }
body.light .mobile-nav { color: #94a3b8; }
body.light .mobile-nav.active { color: #0f766e; }

@media (max-width: 768px) {
  .stats-grid { grid-template-columns: 1fr; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(45,212,191,0.15); border-radius: 3px; }

/* Rating badge colors */
.rating-strong-buy { background: rgba(52,211,153,0.18); color: #34d399; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
.rating-buy { background: rgba(52,211,153,0.12); color: #6ee7b7; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
.rating-hold { background: rgba(245,158,11,0.12); color: #fbbf24; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
.rating-reduce { background: rgba(249,115,22,0.12); color: #fb923c; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
.rating-sell { background: rgba(248,113,113,0.12); color: #f87171; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
.rating-strong-sell { background: rgba(248,113,113,0.18); color: #ef4444; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
</style>
</head>
<body>

<div id="app" class="min-h-screen flex flex-col">
  <!-- Toast -->
  <div id="toast" class="hidden glass px-5 py-3 text-sm"></div>

  <!-- Sidebar (desktop) + Nav -->
  <div class="flex flex-1">
    <!-- Left Sidebar (desktop) -->
    <aside class="hidden lg:flex flex-col w-64 border-r border-navy-700/50 bg-navy-900/50 backdrop-blur-md p-4 gap-2" style="position:sticky;top:0;height:100vh;">
      <!-- Logo area -->
      <div class="flex items-center gap-3 px-3 py-4 mb-2">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-teal-400 to-emerald-500 flex items-center justify-center text-navy-950 font-bold text-sm">SS</div>
        <div>
          <div class="font-semibold text-sm tracking-wide">StockSage AI</div>
          <div class="text-dim text-[11px]">PSX Smart Dashboard</div>
        </div>
      </div>
      <!-- Nav links -->
      <nav class="flex flex-col gap-1">
        <a href="#dashboard" data-route="dashboard" class="nav-item active"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <a href="#watchlist" data-route="watchlist" class="nav-item"><i class="fas fa-star"></i> Watchlist</a>
        <a href="#sectors" data-route="sectors" class="nav-item"><i class="fas fa-layer-group"></i> Sectors</a>
        <a href="#market" data-route="market" class="nav-item"><i class="fas fa-chart-bar"></i> Market Breadth</a>
        <a href="#index" data-route="index" class="nav-item"><i class="fas fa-chart-line"></i> KSE-100 Index</a>
        <a href="#search" data-route="search" class="nav-item"><i class="fas fa-search"></i> Search</a>
      </nav>
      <!-- Trading clock -->
      <div class="mt-auto pt-4 border-t border-navy-700/50">
        <div class="text-dim text-[10px] uppercase tracking-wider mb-1">PSX Market</div>
        <div id="tradingClock" class="text-xs"></div>
      </div>
      <!-- Settings -->
      <div class="pt-2">
        <button onclick="App.toggleTheme()" class="nav-item w-full text-left text-xs text-dim hover:text-slate-300">
          <i class="fas fa-moon"></i> <span id="themeLabel">Dark Mode</span>
        </button>
      </div>
    </aside>

    <!-- Mobile nav (bottom bar) -->
    <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-navy-900/95 backdrop-blur-md border-t border-navy-700/50 z-40 flex justify-around py-2">
      <button data-route="dashboard" class="mobile-nav active flex flex-col items-center text-[10px]"><i class="fas fa-chart-pie text-base"></i> Dash</button>
      <button data-route="watchlist" class="mobile-nav flex flex-col items-center text-[10px]"><i class="fas fa-star text-base"></i> Watch</button>
      <button data-route="sectors" class="mobile-nav flex flex-col items-center text-[10px]"><i class="fas fa-layer-group text-base"></i> Sector</button>
      <button data-route="market" class="mobile-nav flex flex-col items-center text-[10px]"><i class="fas fa-chart-bar text-base"></i> Breadth</button>
      <button data-route="search" class="mobile-nav flex flex-col items-center text-[10px]"><i class="fas fa-search text-base"></i> Search</button>
    </div>

    <!-- Main content area -->
    <main id="mainContent" class="flex-1 p-4 lg:p-6 pb-20 lg:pb-6 overflow-y-auto">
      <!-- Views rendered here by app.js -->
    </main>
  </div>
</div>

<!-- Scripts -->
<script src="js/stocks.js"></script>
<script src="js/api.js"></script>
<script src="js/indicators.js"></script>
<script src="js/recommend.js"></script>
<script src="js/sectors.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
